name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: '0.17.0-dev.56+a8226cd53'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        uses: stacksjs/action-releaser@v1.2.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-macos
            archive: tar.gz
          - target: x86_64-macos
            archive: tar.gz
          - target: x86_64-linux-musl
            archive: tar.gz
          - target: aarch64-linux-musl
            archive: tar.gz
          - target: x86_64-windows-gnu
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          asset="bump-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C zig-out/bin bump
          sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          asset="bump-${GITHUB_REF_NAME}-${{ matrix.target }}.zip"
          (cd zig-out/bin && zip "$GITHUB_WORKSPACE/$asset" bump.exe)
          sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET" "$ASSET.sha256" --clobber

  publish-pantry:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Publish to Pantry
        uses: home-lang/pantry/packages/action@main
        with:
          publish: zig
          install: 'false'
        env:
          PANTRY_TOKEN: ${{ secrets.PANTRY_TOKEN }}
